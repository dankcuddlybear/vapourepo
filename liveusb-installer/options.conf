# Specify partitions for installation. You can also specify partition labels, and whether to format them or not.
# All Arch Linux system files from the previous installation will be deleted regardless.
# You MUST specify a root partition and ESP.
LABEL_ROOT="VOSTEST"; DEV_ROOT="/dev/disk/by-label/$LABEL_ROOT"; FORMAT_ROOT=0
LABEL_BOOT="BOOTTEST"; DEV_BOOT="/dev/disk/by-label/$LABEL_BOOT"; FORMAT_BOOT=0
#LABEL_MEDIA="media"; DEV_MEDIA="/dev/disk/by-label/$LABEL_MEDIA"; FORMAT_MEDIA=0
#LABEL_HOME="home"; DEV_HOME="/dev/disk/by-label/$LABEL_HOME"; FORMAT_HOME=0
#LABEL_PUBLIC="public"; DEV_PUBLIC="/dev/disk/by-label/$LABEL_PUBLIC"; FORMAT_PUBLIC=0

DISPLAY_SCALE=125				# Display scale in percent. Must be an integer between 25 and 1000. If text appears too small increase this value.
OWNER="alex4nder"				# The first user account created. This is the "owner" of the device, and will be given admin priviliges.
PKG_EXTRA="firefox"					# Extra packages to be installed afterwards
LOCALE="en_GB.UTF-8"			# Locale to use
HOST_NAME="alex4nder-laptop"	# Machine host name - will be saved to /etc/hostname
KEYMAP="uk"						# Console keymap - will be saved to /etc/vconsole.conf
XKEYMAP="gb"					# X11 keymap - will be saved to /etc/X11/xorg.conf.d/00-keyboard.conf
TIMEZONE="Europe/London"		# Time zone - will be saved to /etc/localtime